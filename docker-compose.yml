version: "3.9"

services:
  healmatrix:
    build: .
    container_name: healmatrix-ai
    ports:
      - "7860:7860"

    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s